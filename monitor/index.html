<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI 算力鬼故事监控</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="scanlines" aria-hidden="true"></div>

<header class="topbar">
  <div class="brand">
    <span class="pulse-dot" id="live-dot"></span>
    <h1>AI&nbsp;算力&nbsp;<em>鬼故事</em>&nbsp;监控</h1>
  </div>
  <div class="topbar-stats">
    <span class="stat"><b id="count-total">–</b> 信号</span>
    <span class="stat lvl-alert"><b id="count-alert">–</b> 警报</span>
    <span class="stat lvl-watch"><b id="count-watch">–</b> 观察</span>
    <span class="stat lvl-log"><b id="count-log">–</b> 记录</span>
  </div>
  <nav class="tabs">
    <button class="tab active" data-view="monitor">监控</button>
    <button class="tab" data-view="analyze">分析</button>
  </nav>
  <div class="topbar-right">
    <button id="lang-btn" title="切换新闻语言">中 / EN</button>
    <span id="updated-at">—</span>
    <button id="refresh-btn" title="Refresh">↻</button>
  </div>
</header>

<main id="view-monitor" class="view monitor">
  <section class="feed-pane">
    <div class="feed-toolbar" id="filters">
      <button class="chip active" data-level="all">全部</button>
      <button class="chip chip-alert" data-level="alert">警报</button>
      <button class="chip chip-watch" data-level="watch">观察</button>
      <button class="chip chip-log" data-level="log">记录</button>
      <button class="chip" id="capture-btn" type="button">抓取最新</button>
    </div>
    <div class="feed" id="feed"></div>
  </section>

  <section class="detail-pane" id="detail">
    <div class="detail-empty">选择一条信号</div>
  </section>
</main>

<main id="view-analyze" class="view analyze" hidden>
  <section class="analyze-form-pane">
    <h2 class="pane-title">// 单条新闻分析</h2>
    <form id="analyze-form">
      <label>标题
        <input name="title" required placeholder="据报道 Meta 计划出售多余的 AI 算力" />
      </label>
      <label>摘要
        <textarea name="summary" rows="3" placeholder="这条消息可能引发市场对 AI 基础设施产能过剩的担忧。"></textarea>
      </label>
      <div class="form-row">
        <label>来源
          <input name="source" placeholder="Reuters / Bloomberg" />
        </label>
        <label>标的 <span class="hint">逗号分隔</span>
          <input name="symbols" placeholder="META, NVDA, AMD, SMH" />
        </label>
      </div>
      <label>市场确认 JSON <span class="hint">可选</span>
        <textarea name="market" rows="5" spellcheck="false" placeholder='{"NVDA": {"return_pct": -2.4, "volume_z": 2.2}}'></textarea>
      </label>
      <div class="form-actions">
        <button type="submit" id="analyze-btn">开始分析</button>
        <span id="analyze-status"></span>
      </div>
    </form>
  </section>
  <section class="detail-pane" id="analyze-result">
    <div class="detail-empty">结果预览</div>
  </section>
</main>

<script src="main.js"></script>
</body>
</html>
